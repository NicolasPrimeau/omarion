services:
  artel:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - artel-data:/data
      - ./artel:/app/artel
    env_file: .env
    environment:
      - DB_PATH=/data/artel.db
    command: ["uvicorn", "artel.server.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  archivist:
    build: .
    restart: unless-stopped
    volumes:
      - ./artel:/app/artel
    command: ["watchfiles", "python -m artel.archivist", "/app/artel"]
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
    depends_on:
      - artel

  mcp:
    build: .
    restart: unless-stopped
    volumes:
      - ./artel:/app/artel
    command: ["watchfiles", "python -m artel.mcp", "/app/artel"]
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
      - MCP_TRANSPORT=sse
      - MCP_PORT=8001
    depends_on:
      - artel

volumes:
  artel-data:
