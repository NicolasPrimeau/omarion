services:
  artel:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - artel-data:/data
      - ./artel:/app/artel
    env_file: .env
    environment:
      - DB_PATH=/data/artel.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  archivist:
    build: .
    restart: unless-stopped
    volumes:
      - ./artel:/app/artel
    command: ["python", "-m", "artel.archivist"]
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
    depends_on:
      artel:
        condition: service_healthy

  mcp:
    build: .
    restart: unless-stopped
    volumes:
      - ./artel:/app/artel
    command: ["python", "-m", "artel.mcp"]
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8001
    depends_on:
      artel:
        condition: service_healthy

  mdns:
    build: .
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "artel.server.mdns_announce"]
    volumes:
      - ./artel:/app/artel
    env_file: .env
    depends_on:
      artel:
        condition: service_healthy

volumes:
  artel-data:
