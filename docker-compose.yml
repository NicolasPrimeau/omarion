services:
  omarion:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - omarion-data:/data
    env_file: .env
    environment:
      - DB_PATH=/data/omarion.db

  archivist:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "omarion.archivist"]
    env_file: .env
    environment:
      - OMARION_URL=http://omarion:8000
    depends_on:
      - omarion

  mcp:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "omarion.mcp"]
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - OMARION_URL=http://omarion:8000
      - MCP_TRANSPORT=sse
      - MCP_PORT=8001
    depends_on:
      - omarion

volumes:
  omarion-data:
