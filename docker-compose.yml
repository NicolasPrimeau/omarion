services:
  artel:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - artel-data:/data
    env_file: .env
    environment:
      - DB_PATH=/data/artel.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  archivist:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    command: ["python", "-m", "artel.archivist"]
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
    depends_on:
      artel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib, time; p=pathlib.Path('/tmp/archivist.heartbeat'); exit(0 if p.exists() and time.time()-p.stat().st_mtime < 7200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  mcp:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    command: ["python", "-m", "artel.mcp"]
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8001
    depends_on:
      artel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8001)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mdns:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "artel.server.mdns_announce"]
    env_file: .env
    depends_on:
      artel:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup artel-artel-1 artel-archivist-1 artel-mcp-1 artel-mdns-1

volumes:
  artel-data:
