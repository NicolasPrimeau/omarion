services:
  artel:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - artel-data:/data
    env_file: .env
    environment:
      - DB_PATH=/data/artel.db
      - FASTEMBED_CACHE_PATH=/data/fastembed_cache
      - HF_HUB_DISABLE_XET_DOWNLOAD=1
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  archivist:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    command: ["python", "-m", "artel.archivist"]
    env_file: .env
    environment:
      - ARTEL_URL=http://artel:8000
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      artel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib, time; p=pathlib.Path('/tmp/archivist.heartbeat'); exit(0 if p.exists() and time.time()-p.stat().st_mtime < 7200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  # mDNS broadcasts artel.local on the network so agents can onboard without knowing the IP.
  # Requires network_mode: host — Linux only. Remove this service on Mac/Windows Docker Desktop.
  mdns:
    image: ghcr.io/nicolasprimeau/artel:edge
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "artel.server.mdns_announce"]
    env_file: .env
    depends_on:
      artel:
        condition: service_healthy

  # containrrr/watchtower was archived in 2024 — its Docker API (1.25) is below
  # the 1.40 minimum required by Docker Engine 27+. nickfedor/watchtower is the
  # community-maintained continuation with the same config and labels.
  watchtower:
    image: nickfedor/watchtower:1.17.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable

volumes:
  artel-data:
