<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>artel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #09090b;
  --s1:        #18181b;
  --s2:        #27272a;
  --s3:        #3f3f46;
  --b1:        #27272a;
  --b2:        #3f3f46;
  --t1:        #fafafa;
  --t2:        #a1a1aa;
  --t3:        #71717a;
  --t4:        #52525b;
  --accent:    #60a5fa;
  --a-bg:      rgba(96,165,250,.12);
  --a-border:  rgba(96,165,250,.25);
  --green:     #4ade80;
  --g-bg:      rgba(74,222,128,.1);
  --red:       #f87171;
  --r-bg:      rgba(248,113,113,.1);
  --orange:    #fb923c;
  --o-bg:      rgba(251,146,60,.1);
  --purple:    #c084fc;
  --p-bg:      rgba(192,132,252,.1);
  --font:      'Inter',system-ui,sans-serif;
  --mono:      'JetBrains Mono',monospace;
  --r:         6px;
  --r-sm:      4px;
  --hh:        52px;
  --nh:        40px;
}

html{height:100%}
body{font:14px/1.6 var(--font);background:var(--bg);color:var(--t1);min-height:100%}

/* ── Header ──────────────────────────────── */
header{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;height:var(--hh);
  background:var(--s1);border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:200;
}
header b{
  font:600 15px var(--font);color:var(--t1);
  letter-spacing:-.3px;flex-shrink:0;
}
.h-sep{color:var(--b2);font-size:11px;flex-shrink:0}
#h-agent-sel,select#h-project{
  background:transparent;border:1px solid var(--b1);
  color:var(--t3);font:13px var(--font);
  padding:4px 8px;border-radius:var(--r-sm);
  min-width:0;max-width:140px;cursor:pointer;
  transition:border-color .15s,color .15s;
}
#h-agent-sel:hover,select#h-project:hover{border-color:var(--b2);color:var(--t2)}
#h-agent-sel:focus,select#h-project:focus{outline:none;border-color:var(--accent);color:var(--t1)}
.spacer{flex:1}
a.out{
  color:var(--t4);font-size:13px;text-decoration:none;
  flex-shrink:0;padding:5px 9px;border-radius:var(--r-sm);
  transition:color .15s,background .15s;
}
a.out:hover{color:var(--t2);background:var(--s2)}

/* ── Nav ─────────────────────────────────── */
nav{
  display:flex;background:var(--s1);
  border-bottom:1px solid var(--b1);
  overflow-x:auto;scrollbar-width:none;
  position:sticky;top:var(--hh);z-index:199;
}
nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;border:none;border-bottom:2px solid transparent;
  background:none;padding:0 16px;height:var(--nh);
  font:500 13px var(--font);color:var(--t4);
  cursor:pointer;white-space:nowrap;position:relative;
  transition:color .15s;
}
.nav-btn:hover{color:var(--t2);background:none}
.nav-btn.on{color:var(--t1);border-bottom-color:var(--accent)}
.badge{
  position:absolute;top:5px;right:6px;
  background:var(--accent);color:#000;
  font:700 10px var(--font);border-radius:8px;
  padding:0 5px;line-height:16px;min-width:16px;text-align:center;
}

/* ── Inputs / selects / textareas ─────────── */
input,select,textarea{
  background:var(--s2);color:var(--t1);
  border:1px solid var(--b1);
  padding:8px 12px;font:14px var(--font);
  border-radius:var(--r-sm);outline:none;
  transition:border-color .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--t4)}
textarea{resize:vertical}

/* ── Buttons ─────────────────────────────── */
button{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  background:var(--s2);color:var(--t2);
  border:1px solid var(--b1);
  padding:0 14px;height:34px;
  font:500 13px var(--font);
  border-radius:var(--r-sm);cursor:pointer;
  white-space:nowrap;
  transition:background .15s,border-color .15s,color .15s;
}
button:hover{background:var(--s3);border-color:var(--b2);color:var(--t1)}
button:active{opacity:.8}

button.p{
  background:var(--a-bg);color:var(--accent);
  border-color:var(--a-border);
}
button.p:hover{background:rgba(96,165,250,.2);border-color:var(--accent)}

button.danger{color:var(--t3);border-color:var(--b1)}
button.danger:hover{background:var(--r-bg);color:var(--red);border-color:rgba(248,113,113,.3)}

@media(max-width:600px){
  input,select,textarea,button{font-size:16px}
  button{height:44px}
}

/* ── Panels ──────────────────────────────── */
.panel{display:none;padding:20px;max-width:1040px}
.panel.on{display:block}

/* ── Toolbar ─────────────────────────────── */
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.toolbar input,.toolbar select{min-width:0}

/* ── Write box ───────────────────────────── */
.write-box{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:16px;margin-bottom:20px;
}
.write-box textarea{
  width:100%;margin-bottom:10px;min-height:80px;
  background:var(--bg);border-color:var(--b1);
}
.write-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.write-row input,.write-row select{min-width:0}

@media(max-width:600px){
  .write-row{flex-direction:column;align-items:stretch}
  .write-row .spacer{display:none}
  .write-row button,.write-row input,.write-row select{width:100%}
}

/* ── Cards ───────────────────────────────── */
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:14px 16px;
  margin-bottom:8px;transition:border-color .15s;
}
.card:hover{border-color:var(--b2)}

.meta{
  display:flex;gap:7px;align-items:center;flex-wrap:wrap;
  margin-bottom:8px;font:12px var(--mono);color:var(--t4);
}
.meta-agent{color:var(--accent);font-weight:500}
.meta-time{color:var(--t4);margin-left:auto}
.meta-id{color:var(--t4)}

/* ── Pills / tags ────────────────────────── */
.tag{
  background:var(--g-bg);color:var(--green);
  padding:2px 8px;border-radius:99px;
  font:11px var(--mono);
}
.pill{padding:2px 8px;border-radius:99px;font:600 11px var(--mono)}
.pill.memory {background:var(--a-bg); color:var(--accent)}
.pill.doc    {background:var(--p-bg); color:var(--purple)}
.pill.private{background:var(--r-bg); color:var(--red)}
.pill.global {background:var(--o-bg); color:var(--orange)}
.pill.project{background:var(--a-bg); color:var(--accent);border:1px solid var(--a-border)}

.conf{font:11px var(--mono);color:var(--t4)}
.conf span{color:var(--green)}

pre{white-space:pre-wrap;word-break:break-word;font:13px/1.7 var(--mono);color:var(--t2)}

/* ── Card actions ────────────────────────── */
.card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.card-actions button{height:28px;font-size:12px;padding:0 10px}

/* ── Status / priority ───────────────────── */
.s{padding:2px 8px;border-radius:99px;font:600 11px var(--mono)}
.s.open     {background:var(--o-bg);color:var(--orange)}
.s.claimed  {background:var(--a-bg);color:var(--accent)}
.s.completed{background:var(--g-bg);color:var(--green)}
.s.failed   {background:var(--r-bg);color:var(--red)}

.pri{font:600 11px var(--mono)}
.pri.high{color:var(--red)}
.pri.low {color:var(--t4)}

/* ── Events ──────────────────────────────── */
#ev-log{
  height:400px;overflow-y:auto;
  font:12px/1.5 var(--mono);
  border:1px solid var(--b1);border-radius:var(--r);
  padding:4px;background:var(--s1);
  scrollbar-width:thin;scrollbar-color:var(--s3) transparent;
}
.el{
  padding:4px 8px;border-radius:var(--r-sm);
  display:grid;gap:8px;align-items:baseline;
  grid-template-columns:65px 1fr auto;
  grid-template-areas:"time type payload";
}
.el:hover{background:var(--s2)}
.el-time   {color:var(--t4);grid-area:time}
.el-type   {color:var(--accent);grid-area:type}
.el-agent  {color:var(--t3);display:none}
.el-payload{color:var(--t3);grid-area:payload;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}

@media(min-width:700px){
  .el{grid-template-columns:65px 200px 120px 1fr;grid-template-areas:"time type agent payload"}
  .el-agent{display:block}
}

.sse-status{font:13px var(--mono);padding:4px 10px;border-radius:var(--r-sm)}
.sse-status.on {color:var(--green); background:var(--g-bg)}
.sse-status.off{color:var(--t3);    background:var(--s2)}

/* ── Agents ──────────────────────────────── */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ac{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:14px 16px;
  transition:border-color .15s;
}
.ac:hover{border-color:var(--b2)}
.ac-name{
  font:500 14px var(--font);color:var(--t2);
  margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--s3);flex-shrink:0}
.ac.active .dot{background:var(--green)}
.ac.active .ac-name{color:var(--t1)}
.ac-meta{font:12px var(--mono);color:var(--t3);display:flex;flex-direction:column;gap:3px;margin-bottom:10px}

/* ── Projects ────────────────────────────── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.pj{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:16px;cursor:pointer;
  transition:border-color .15s;
}
.pj:hover{border-color:var(--b2)}
.pj.mine{border-color:var(--a-border)}
.pj-name  {font:600 15px var(--font);color:var(--t1);margin-bottom:6px}
.pj-agents{font:12px var(--mono);color:var(--t3);margin-bottom:8px}
.pj-stats {font:12px var(--mono);color:var(--t4);display:flex;gap:14px;flex-wrap:wrap}
.pj-stat-val{color:var(--t3)}

/* ── Misc ────────────────────────────────── */
.flash{color:var(--green);font-size:13px;margin-left:4px;opacity:0;transition:opacity .3s;white-space:nowrap}
.flash.show{opacity:1}

.section-label{
  font:500 11px var(--mono);color:var(--t4);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;
}

.empty{color:var(--t4);padding:40px 0;text-align:center;font-size:14px}

/* ── Mobile ──────────────────────────────── */
@media(max-width:600px){
  header{padding:0 14px;gap:8px}
  #h-agent-sel,select#h-project{max-width:110px;font-size:12px}
  .panel{padding:14px}
  .write-box{padding:14px}
  .agent-grid,.proj-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script>/*CREDS*/</script>

<header>
  <b>artel</b>
  <span class="h-sep">|</span>
  <select id="h-agent-sel" onchange="onAgentChange()" title="active agent">
    <option value="">all agents</option>
  </select>
  <select id="h-project" onchange="onProjectChange()" title="active project">
    <option value="">all projects</option>
  </select>
  <div class="spacer"></div>
  <a class="out" href="/ui/logout">logout</a>
</header>

<nav>
  <button class="nav-btn on" onclick="tab('memory',this)">memory</button>
  <button class="nav-btn" onclick="tab('tasks',this)">tasks</button>
  <button class="nav-btn" onclick="tab('messages',this)" id="btn-messages">messages</button>
  <button class="nav-btn" onclick="tab('events',this)">events</button>
  <button class="nav-btn" onclick="tab('agents',this)">agents</button>
  <button class="nav-btn" onclick="tab('projects',this)">projects</button>
  <button class="nav-btn" onclick="tab('sessions',this)">sessions</button>
</nav>

<!-- MEMORY -->
<div id="panel-memory" class="panel on">
  <div class="toolbar">
    <input id="q" placeholder="search…" style="flex:1;min-width:120px" onkeydown="if(event.key==='Enter')search()">
    <select id="q-agent" style="width:130px"><option value="">all agents</option></select>
    <select id="q-type" style="width:110px" onchange="search()">
      <option value="">all types</option>
      <option>memory</option>
      <option>doc</option>
    </select>
    <button onclick="search()">search</button>
    <button onclick="loadMem()">all</button>
  </div>
  <div class="write-box">
    <textarea id="mc" placeholder="write memory…" rows="3"></textarea>
    <div class="write-row">
      <input id="mtags" placeholder="tags (comma-separated)" style="flex:1">
      <select id="mtype"><option>memory</option><option>doc</option></select>
      <select id="mscope"><option value="shared">shared</option><option value="private">private</option><option value="global">global</option></select>
      <button class="p" onclick="writeMem()">write</button>
      <span class="flash" id="mem-flash">saved</span>
    </div>
  </div>
  <div id="mlist"></div>
</div>

<!-- TASKS -->
<div id="panel-tasks" class="panel">
  <div class="toolbar">
    <select id="tf" onchange="loadTasks()">
      <option value="">all</option><option>open</option><option>claimed</option><option>completed</option><option>failed</option>
    </select>
    <button onclick="loadTasks()">refresh</button>
  </div>
  <div class="write-box">
    <div class="write-row">
      <input id="ttitle" placeholder="title" style="flex:2">
      <input id="tdesc" placeholder="description (optional)" style="flex:3">
      <select id="tpri"><option>normal</option><option>low</option><option>high</option></select>
      <button class="p" onclick="createTask()">create</button>
    </div>
  </div>
  <div id="tlist"></div>
</div>

<!-- MESSAGES -->
<div id="panel-messages" class="panel">
  <div class="write-box">
    <div class="write-row" style="margin-bottom:10px">
      <input id="mto" placeholder="to…" style="flex:1" list="agent-list-dl">
      <datalist id="agent-list-dl"></datalist>
      <input id="msub" placeholder="subject (optional)" style="flex:1">
    </div>
    <textarea id="mbody" placeholder="message…" rows="3"></textarea>
    <div class="write-row" style="margin-top:10px">
      <div class="spacer"></div>
      <button class="p" onclick="sendMsg()">send</button>
      <span class="flash" id="msg-flash">sent</span>
    </div>
  </div>
  <div class="section-label">inbox</div>
  <div id="msglist"></div>
</div>

<!-- EVENTS -->
<div id="panel-events" class="panel">
  <div class="toolbar">
    <button class="p" onclick="startSSE()">connect</button>
    <button onclick="stopSSE()">disconnect</button>
    <button onclick="$('ev-log').innerHTML=''">clear</button>
    <span class="sse-status off" id="sse-status">disconnected</span>
  </div>
  <div id="ev-log"><div class="empty">connect to stream live events</div></div>
</div>

<!-- AGENTS -->
<div id="panel-agents" class="panel">
  <div class="toolbar">
    <button onclick="loadAgents()">refresh</button>
  </div>
  <div id="alist"></div>
</div>

<!-- PROJECTS -->
<div id="panel-projects" class="panel">
  <div class="toolbar">
    <button onclick="loadProjects()">refresh</button>
  </div>
  <div id="pjlist"></div>
</div>

<!-- SESSIONS -->
<div id="panel-sessions" class="panel">
  <div class="toolbar">
    <select id="sess-agent" onchange="loadSession()" style="width:200px">
      <option value="">select agent…</option>
    </select>
    <button class="p" onclick="loadSession()">load</button>
    <div class="spacer"></div>
    <span class="flash" id="session-flash">saved</span>
  </div>
  <div id="session-context" style="margin-bottom:18px"></div>
  <div class="write-box" id="handoff-box" style="display:none">
    <div class="section-label" style="margin-bottom:12px">save handoff</div>
    <textarea id="hs-summary" placeholder="what did you accomplish this session?" rows="3" style="width:100%;margin-bottom:10px"></textarea>
    <textarea id="hs-next" placeholder="next steps (one per line)" rows="2" style="width:100%;margin-bottom:10px"></textarea>
    <textarea id="hs-inprogress" placeholder="task IDs in progress (one per line)" rows="2" style="width:100%;margin-bottom:10px"></textarea>
    <div class="write-row" style="margin-top:6px">
      <div class="spacer"></div>
      <button class="p" onclick="saveHandoff()">save handoff</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const hdrs=()=>({'content-type':'application/json','x-agent-id':window._aid,'x-api-key':window._akey});
let _sseAbort=null;
let _agents=[];
let _projects=[];
async function adminReq(method,path,body){
  const k=window._regkey;
  const r=await fetch(path,{method,headers:{'content-type':'application/json','x-registration-key':k},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return method==='DELETE'?null:r.json();
}

function activeProject(){return $('h-project').value||null}
function activeAgent(){return $('h-agent-sel').value||null}

async function req(method,path,body){
  const r=await fetch(path,{method,headers:hdrs(),body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return method==='DELETE'?null:r.json();
}

function flash(id){
  const el=$(id);el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function tab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  $('panel-'+name).classList.add('on');btn.classList.add('on');
  if(name==='memory')loadMem();
  if(name==='tasks')loadTasks();
  if(name==='messages')loadInbox();
  if(name==='agents')loadAgents();
  if(name==='projects')loadProjects();
  if(name==='sessions'){populateSessionAgents();loadSession();}
}

function onProjectChange(){
  const panel=document.querySelector('.panel.on');
  if(!panel)return;
  const name=panel.id.replace('panel-','');
  if(name==='memory')loadMem();
  if(name==='tasks')loadTasks();
  if(name==='agents')loadAgents();
  if(name==='projects')loadProjects();
}

function onAgentChange(){
  const agent=activeAgent();
  $('q-agent').value=agent||'';
  const sa=$('sess-agent');
  if(sa)sa.value=agent||'';
  const panel=document.querySelector('.panel.on');
  if(!panel)return;
  const name=panel.id.replace('panel-','');
  if(name==='memory')loadMem();
  if(name==='tasks')loadTasks();
  if(name==='messages')loadInbox();
  if(name==='sessions')loadSession();
  if(name==='events'&&_sseAbort)startSSE();
}

async function init(){
  await Promise.all([loadProjectsHeader(),loadAgentsGlobal()]);
  loadMem();
  checkInbox();
  setInterval(checkInbox,30000);
}

async function loadProjectsHeader(){
  try{
    _projects=await req('GET','/projects');
    const sel=$('h-project');
    _projects.forEach(p=>{
      const o=document.createElement('option');
      o.value=p.name;o.textContent=p.name;
      sel.appendChild(o);
    });
  }catch(_){}
}

async function loadAgentsGlobal(){
  try{
    _agents=await req('GET','/participants');
    const dl=$('agent-list-dl');
    dl.innerHTML='';
    const qa=$('q-agent');
    qa.innerHTML='<option value="">all agents</option>';
    const sa=$('sess-agent');
    sa.innerHTML='<option value="">select agent…</option>';
    const ha=$('h-agent-sel');
    ha.innerHTML='<option value="">all agents</option>';
    _agents.forEach(a=>{
      const o=document.createElement('option');
      o.value=a.agent_id;o.textContent=a.agent_id;
      dl.appendChild(o.cloneNode(true));
      qa.appendChild(o.cloneNode(true));
      sa.appendChild(o.cloneNode(true));
      ha.appendChild(o);
    });
  }catch(_){}
}

async function loadMem(){
  const proj=activeProject();
  const agent=activeAgent()||$('q-agent').value;
  let url='/memory/delta?since=2000-01-01T00:00:00.000Z';
  if(proj)url+='&project='+encodeURIComponent(proj);
  if(agent)url+='&agent='+encodeURIComponent(agent);
  try{renderMem((await req('GET',url)).reverse());}
  catch(e){$('mlist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}

async function search(){
  const q=$('q').value.trim();
  const agent=$('q-agent').value;
  const type=$('q-type').value;
  const proj=activeProject();
  if(!q&&!agent&&!type)return loadMem();
  if(q){
    let url='/memory/search?q='+encodeURIComponent(q)+'&limit=30';
    if(proj)url+='&project='+encodeURIComponent(proj);
    if(agent)url+='&agent='+encodeURIComponent(agent);
    try{renderMem(await req('GET',url));}
    catch(e){$('mlist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
  }else{
    let url='/memory?limit=100';
    if(proj)url+='&project='+encodeURIComponent(proj);
    if(agent)url+='&agent='+encodeURIComponent(agent);
    if(type)url+='&type='+encodeURIComponent(type);
    try{renderMem(await req('GET',url));}
    catch(e){$('mlist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
  }
}

function renderMem(es){
  if(!es.length){$('mlist').innerHTML='<div class="empty">no entries</div>';return;}
  $('mlist').innerHTML=es.map(e=>{
    const conf=e.confidence<1?`<span class="conf">conf <span>${(e.confidence*100).toFixed(0)}%</span></span>`:'';
    const scope=e.scope==='private'?`<span class="pill private">private</span>`:e.scope==='global'?`<span class="pill global">global</span>`:'';
    const tags=e.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(' ');
    const proj=e.project?`<span class="pill project">${esc(e.project)}</span>`:'';
    return `<div class="card" id="mc-${e.id}">
      <div class="meta">
        <span class="meta-agent">${esc(e.agent_id)}</span>
        <span class="pill ${e.type}">${e.type}</span>
        ${proj}${scope}${conf}${tags}
        <span class="meta-time">${e.updated_at.slice(0,16)}</span>
        <span class="meta-id">${e.id.slice(0,8)}</span>
      </div>
      <pre id="mpre-${e.id}">${esc(e.content)}</pre>
      <div id="medit-${e.id}" style="display:none">
        <textarea id="mta-${e.id}" rows="4" style="width:100%;margin-bottom:8px">${esc(e.content)}</textarea>
        <div class="write-row">
          <button class="p" onclick="saveMem('${e.id}')">save</button>
          <button onclick="cancelEditMem('${e.id}')">cancel</button>
        </div>
      </div>
      <div class="card-actions">
        <button onclick="startEditMem('${e.id}')">edit</button>
        <button class="danger" onclick="deleteMem('${e.id}')">delete</button>
      </div>
    </div>`;
  }).join('');
}

function startEditMem(id){
  $('mpre-'+id).style.display='none';
  $('medit-'+id).style.display='block';
  $('mta-'+id).focus();
}
function cancelEditMem(id){
  $('mpre-'+id).style.display='';
  $('medit-'+id).style.display='none';
}
async function saveMem(id){
  const content=$('mta-'+id).value.trim();if(!content)return;
  await req('PATCH',`/memory/${id}`,{content});
  flash('mem-flash');loadMem();
}
async function writeMem(){
  const c=$('mc').value.trim();if(!c)return;
  const tags=$('mtags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const proj=activeProject();
  await req('POST','/memory',{content:c,type:$('mtype').value,project:proj,scope:$('mscope').value,tags,confidence:1.0,parents:[]});
  $('mc').value='';$('mtags').value='';flash('mem-flash');loadMem();
}
async function deleteMem(id){
  if(!confirm('Delete this entry?'))return;
  await req('DELETE',`/memory/${id}`);loadMem();
}

async function loadTasks(){
  const s=$('tf').value;
  const proj=activeProject();
  const agent=activeAgent();
  let url='/tasks';const params=[];
  if(s)params.push('status='+s);
  if(proj)params.push('project='+encodeURIComponent(proj));
  if(agent)params.push('agent='+encodeURIComponent(agent));
  if(params.length)url+='?'+params.join('&');
  try{
    const ts=await req('GET',url);
    if(!ts.length){$('tlist').innerHTML='<div class="empty">no tasks</div>';return;}
    $('tlist').innerHTML=ts.map(t=>`
      <div class="card">
        <div class="meta">
          <span class="s ${t.status}">${t.status}</span>
          ${t.priority!=='normal'?`<span class="pri ${t.priority}">${t.priority}</span>`:''}
          ${t.project?`<span class="pill project">${esc(t.project)}</span>`:''}
          <span style="color:var(--t4)">by <span class="meta-agent">${esc(t.created_by)}</span></span>
          ${t.assigned_to?`<span style="color:var(--t3)">→ <span style="color:var(--accent)">${esc(t.assigned_to)}</span></span>`:''}
          <span class="meta-time">${t.created_at.slice(0,16)}</span>
        </div>
        <div style="font-weight:500">${esc(t.title)}</div>
        ${t.description?`<div style="color:var(--t3);font-size:13px;margin-top:3px">${esc(t.description)}</div>`:''}
        <div class="card-actions">
          ${t.status==='open'?`<button onclick="taskAction('${t.id}','claim')">claim</button>`:''}
          ${t.status==='claimed'?`<button onclick="taskAction('${t.id}','complete')">complete</button><button class="danger" onclick="taskAction('${t.id}','fail')">fail</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){$('tlist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}
async function createTask(){
  const title=$('ttitle').value.trim();if(!title)return;
  const proj=activeProject();
  await req('POST','/tasks',{title,description:$('tdesc').value,project:proj,priority:$('tpri').value});
  $('ttitle').value='';$('tdesc').value='';loadTasks();
}
async function taskAction(id,action){
  await req('POST',`/tasks/${id}/${action}`);loadTasks();
}

async function loadInbox(){
  $('btn-messages').querySelector('.badge')?.remove();
  const agent=activeAgent();
  const url='/messages/inbox'+(agent?'?agent='+encodeURIComponent(agent):'');
  try{
    const ms=await req('GET',url);
    if(!ms.length){$('msglist').innerHTML='<div class="empty">no unread messages</div>';return;}
    $('msglist').innerHTML=ms.map(m=>`
      <div class="card">
        <div class="meta">
          <span class="meta-agent">${esc(m.from_agent)}</span>
          ${m.subject?`<span style="color:var(--t3)">${esc(m.subject)}</span>`:''}
          <span class="meta-time">${m.created_at.slice(0,16)}</span>
        </div>
        <pre>${esc(m.body)}</pre>
        <div class="card-actions">
          <button onclick="markRead('${m.id}')">mark read</button>
          <button onclick="replyTo('${esc(m.from_agent)}')">reply</button>
        </div>
      </div>`).join('');
  }catch(e){$('msglist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}
async function checkInbox(){
  try{
    const agent=activeAgent();
    const url='/messages/inbox'+(agent?'?agent='+encodeURIComponent(agent):'');
    const ms=await req('GET',url);
    const btn=$('btn-messages');
    btn.querySelector('.badge')?.remove();
    if(ms.length){
      const b=document.createElement('span');
      b.className='badge';b.textContent=ms.length;btn.appendChild(b);
    }
  }catch(_){}
}
async function sendMsg(){
  const to=$('mto').value.trim();if(!to)return;
  const body=$('mbody').value.trim();if(!body)return;
  await req('POST','/messages',{to,subject:$('msub').value||'',body});
  $('mto').value='';$('msub').value='';$('mbody').value='';
  flash('msg-flash');loadInbox();
}
async function markRead(id){
  await req('POST',`/messages/${id}/read`);loadInbox();
}
function replyTo(agent){
  $('mto').value=agent;
  $('mbody').focus();
  document.querySelectorAll('nav button').forEach(b=>{if(b.textContent.trim()==='messages')tab('messages',b);});
}

function startSSE(){
  stopSSE();
  _sseAbort=new AbortController();
  $('sse-status').textContent='connecting…';
  $('sse-status').className='sse-status off';
  const agent=activeAgent();
  const streamUrl='/events/stream'+(agent?'?agent='+encodeURIComponent(agent):'');
  (async()=>{
    try{
      const r=await fetch(streamUrl,{headers:hdrs(),signal:_sseAbort.signal});
      if(!r.ok){setSSEOff('error '+r.status);return;}
      $('sse-status').textContent='connected';$('sse-status').className='sse-status on';
      $('ev-log').innerHTML='';
      const reader=r.body.getReader();const dec=new TextDecoder();
      let buf='';
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){
          if(line.startsWith('data: ')&&line.length>6){
            try{appendEvent(JSON.parse(line.slice(6)));}catch(_){}
          }
        }
      }
      setSSEOff('disconnected');
    }catch(e){if(e.name!=='AbortError')setSSEOff('error');}
  })();
}
function stopSSE(){
  if(_sseAbort){_sseAbort.abort();_sseAbort=null;}
  setSSEOff('disconnected');
}
function setSSEOff(msg){$('sse-status').textContent=msg;$('sse-status').className='sse-status off';}
function appendEvent(e){
  const d=document.createElement('div');d.className='el';
  d.innerHTML=`<span class="el-time">${e.created_at.slice(11,19)}</span><span class="el-type">${esc(e.type)}</span><span class="el-agent">${esc(e.agent_id)}</span><span class="el-payload">${esc(JSON.stringify(e.payload))}</span>`;
  const log=$('ev-log');
  if(log.firstChild?.className==='empty')log.innerHTML='';
  log.prepend(d);
}

async function loadAgents(){
  try{
    const [participants,projects]=await Promise.all([
      req('GET','/participants'),
      req('GET','/projects').catch(()=>[]),
    ]);
    const agentProjects={};
    projects.forEach(p=>p.agents.forEach(a=>{
      (agentProjects[a]||(agentProjects[a]=[])).push(p.name);
    }));
    const now=Date.now();
    if(!participants.length){$('alist').innerHTML='<div class="empty">no agents</div>';return;}
    const sorted=[...participants].sort((a,b)=>{
      const ta=a.last_seen?Date.parse(a.last_seen):0;
      const tb=b.last_seen?Date.parse(b.last_seen):0;
      return tb-ta;
    });
    $('alist').innerHTML='<div class="agent-grid">'+sorted.map(p=>{
      const seenMs=p.last_seen?Date.parse(p.last_seen):null;
      const active=seenMs&&(now-seenMs)<300000;
      const seenLabel=p.last_seen?p.last_seen.slice(0,16):'never';
      const projs=(agentProjects[p.agent_id]||[]).map(n=>`<span class="pill project">${esc(n)}</span>`).join(' ');
      const isSelf=p.agent_id===window._aid;
      return `<div class="ac${active?' active':''}">
        <div class="ac-name"><span class="dot"></span>${esc(p.agent_id)}${isSelf?` <span style="color:var(--t4);font-size:11px">(you)</span>`:''}</div>
        <div class="ac-meta">
          <span>last seen: ${seenLabel}</span>
          ${projs?`<span style="margin-top:4px">${projs}</span>`:''}
        </div>
        <div class="card-actions" style="margin-top:0">
          <button onclick="renameAgent('${esc(p.agent_id)}')">rename</button>
          <button class="danger" onclick="deleteAgent('${esc(p.agent_id)}')">delete</button>
        </div>
      </div>`;
    }).join('')+'</div>';
  }catch(e){$('alist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}
async function deleteAgent(id){
  if(!confirm(`Delete agent "${id}"? This cannot be undone.`))return;
  try{
    await adminReq('DELETE',`/agents/${id}`);
    await loadAgents();await loadAgentsGlobal();
  }catch(e){alert('Failed: '+e.message);}
}
async function renameAgent(id){
  const newId=prompt(`Rename "${id}" to:`);
  if(!newId||newId===id)return;
  try{
    await adminReq('PATCH',`/agents/${id}`,{new_id:newId});
    await loadAgents();await loadAgentsGlobal();
  }catch(e){alert('Failed: '+e.message);}
}

async function loadProjects(){
  try{
    const ps=await req('GET','/projects');
    if(!ps.length){$('pjlist').innerHTML='<div class="empty">no projects</div>';return;}
    $('pjlist').innerHTML='<div class="proj-grid">'+ps.map(p=>{
      const mine=p.name===$('h-project').value;
      const last=p.last_activity?p.last_activity.slice(0,16):'never';
      return `<div class="pj${mine?' mine':''}" onclick="selectProject('${esc(p.name)}')">
        <div class="pj-name">${esc(p.name)}${mine?` <span style="color:var(--green);font-size:11px;font-weight:400">● active</span>`:''}</div>
        <div class="pj-agents">${p.agents.join(', ')||'no agents'}</div>
        <div class="pj-stats">
          <span><span class="pj-stat-val">${p.memory_count}</span> mem</span>
          <span><span class="pj-stat-val">${p.task_count}</span> tasks</span>
          <span>last: <span class="pj-stat-val">${last}</span></span>
        </div>
      </div>`;
    }).join('')+'</div>';
  }catch(e){$('pjlist').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}
function selectProject(name){
  $('h-project').value=name;
  onProjectChange();
}

function populateSessionAgents(){
  const sa=$('sess-agent');
  const g=activeAgent();
  if(g)sa.value=g;
}
async function loadSession(){
  const agent=$('sess-agent').value;
  if(!agent)return;
  const isSelf=agent===window._aid;
  $('handoff-box').style.display=isSelf?'block':'none';
  try{
    const d=await req('GET',`/sessions/handoff/${agent}`);
    const h=d.last_handoff;
    let html='';
    if(h){
      html+=`<div class="card">
        <div class="meta">
          <span class="meta-agent">${esc(h.agent_id)}</span>
          <span class="meta-time">${h.created_at.slice(0,16)}</span>
        </div>
        <pre>${esc(h.summary)}</pre>`;
      if(h.next_steps?.length){
        html+=`<div style="margin-top:12px"><div class="section-label" style="margin-bottom:6px">next steps</div>`;
        html+=h.next_steps.map(s=>`<div style="padding:3px 0;color:var(--t3);font-size:13px">→ ${esc(s)}</div>`).join('');
        html+='</div>';
      }
      if(h.in_progress?.length){
        html+=`<div style="margin-top:12px"><div class="section-label" style="margin-bottom:6px">in progress</div>`;
        html+=h.in_progress.map(s=>`<div style="padding:2px 0"><span class="pill memory">${esc(s)}</span></div>`).join('');
        html+='</div>';
      }
      html+='</div>';
    }else{
      html='<div class="empty">no previous session for '+esc(agent)+'</div>';
    }
    if(d.memory_delta?.length){
      html+=`<div class="section-label" style="margin:18px 0 10px">memory since last session (${d.memory_delta.length})</div>`;
      html+=d.memory_delta.map(e=>`<div class="card">
        <div class="meta">
          <span class="meta-agent">${esc(e.agent_id)}</span>
          <span class="pill ${e.type}">${e.type}</span>
          ${e.project?`<span class="pill project">${esc(e.project)}</span>`:''}
          <span class="meta-time">${e.updated_at.slice(0,16)}</span>
        </div>
        <pre>${esc(e.content.slice(0,400))}</pre>
      </div>`).join('');
    }
    $('session-context').innerHTML=html;
  }catch(e){$('session-context').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}
async function saveHandoff(){
  const summary=$('hs-summary').value.trim();if(!summary)return;
  const next_steps=$('hs-next').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const in_progress=$('hs-inprogress').value.split('\n').map(s=>s.trim()).filter(Boolean);
  await req('POST','/sessions/handoff',{summary,next_steps,in_progress});
  $('hs-summary').value='';$('hs-next').value='';$('hs-inprogress').value='';
  flash('session-flash');loadSession();
}

init();
