<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>omarion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:17px/1.6 'Inter',system-ui,sans-serif;background:#0d0d0d;color:#c8c8c8}
header{display:flex;gap:8px;padding:10px 16px;background:#111;border-bottom:1px solid #1e1e1e;align-items:center}
header b{color:#4af;font-size:17px;letter-spacing:.5px;flex:1}
input,select,textarea,button{background:#161616;color:#c8c8c8;border:1px solid #2a2a2a;padding:6px 11px;font:15px 'Inter',sans-serif;border-radius:3px}
input:focus,textarea:focus{outline:none;border-color:#4af}
button{cursor:pointer}
button:hover{background:#1e1e1e}
button.p{color:#4af;border-color:#4af}
nav{display:flex;background:#111;border-bottom:1px solid #1e1e1e}
nav button{border:none;border-bottom:2px solid transparent;padding:10px 18px;border-radius:0;background:none;font:500 14px 'Inter',sans-serif;letter-spacing:.3px;color:#555}
nav button.on{border-bottom-color:#4af;color:#4af}
.panel{display:none;padding:16px 18px;max-width:960px}
.panel.on{display:block}
.row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}
.row textarea{flex:1}
.card{padding:12px 14px;border:1px solid #1e1e1e;margin-bottom:7px;background:#111;border-radius:3px}
.meta{color:#3a3a3a;font-size:12px;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.tag{background:#1a2a1a;color:#4a8;padding:1px 5px;border-radius:2px;font-size:11px;font-family:'JetBrains Mono',monospace}
pre{white-space:pre-wrap;word-break:break-word;font:15px/1.6 'JetBrains Mono',monospace;color:#c8c8c8}
.s{padding:1px 6px;border-radius:2px;font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:500}
.s.open{color:#fa4;background:#1a1200}
.s.claimed{color:#4af;background:#001422}
.s.completed{color:#4a8;background:#001408}
.s.failed{color:#f55;background:#180000}
#ev{height:400px;overflow-y:auto;font:14px/1.6 'JetBrains Mono',monospace}
.el{padding:3px 0;border-bottom:1px solid #181818}
.et{color:#4af}
a.out{color:#555;font-size:13px;text-decoration:none}
a.out:hover{color:#c8c8c8}
</style>
</head>
<body>
<script>/*CREDS*/</script>
<header>
  <b>omarion</b>
  <a class="out" href="/ui/logout">logout</a>
</header>
<nav>
  <button class="on" onclick="tab('memory',this)">memory</button>
  <button onclick="tab('tasks',this)">tasks</button>
  <button onclick="tab('messages',this)">messages</button>
  <button onclick="tab('events',this)">events</button>
</nav>

<div id="panel-memory" class="panel on">
  <div class="row">
    <input id="q" placeholder="search…" style="flex:1" onkeydown="if(event.key==='Enter')search()">
    <button onclick="search()">search</button>
    <button onclick="loadMem()">all</button>
  </div>
  <div class="row">
    <textarea id="mc" placeholder="write memory…" rows="3"></textarea>
  </div>
  <div class="row">
    <input id="mproject" placeholder="project" style="width:110px">
    <input id="mtags" placeholder="tags" style="flex:1">
    <select id="mtype"><option>memory</option><option>scratch</option><option>doc</option><option>reference</option></select>
    <button class="p" onclick="writeMem()">write</button>
  </div>
  <div id="mlist"></div>
</div>

<div id="panel-tasks" class="panel">
  <div class="row">
    <select id="tf" onchange="loadTasks()">
      <option value="">all</option><option>open</option><option>claimed</option><option>completed</option><option>failed</option>
    </select>
    <button onclick="loadTasks()">refresh</button>
  </div>
  <div class="row">
    <input id="ttitle" placeholder="title" style="flex:2">
    <input id="tdesc" placeholder="description" style="flex:3">
    <input id="tproject" placeholder="project" style="width:100px">
    <select id="tpri"><option>normal</option><option>low</option><option>high</option></select>
    <button class="p" onclick="createTask()">create</button>
  </div>
  <div id="tlist"></div>
</div>

<div id="panel-messages" class="panel">
  <div class="row">
    <input id="mto" placeholder="to (agent_id or broadcast)" style="flex:1">
    <input id="msub" placeholder="subject" style="flex:1">
  </div>
  <div class="row">
    <textarea id="mbody" placeholder="message…" rows="3"></textarea>
    <button class="p" style="align-self:flex-end" onclick="sendMsg()">send</button>
  </div>
  <div style="margin:10px 0 6px;color:#555;font-size:13px">inbox</div>
  <div id="msglist"></div>
</div>

<div id="panel-events" class="panel">
  <div class="row">
    <button onclick="startPoll()">start polling</button>
    <button onclick="document.getElementById('ev').innerHTML=''">clear</button>
  </div>
  <div id="ev"></div>
</div>

<script>
let _poll=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const hdrs=()=>({'content-type':'application/json','x-agent-id':window._aid,'x-api-key':window._akey});

async function req(method,path,body){
  const r=await fetch(path,{method,headers:hdrs(),body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(r.status+' '+await r.text());
  return method==='DELETE'?null:r.json();
}

function tab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  $('panel-'+name).classList.add('on'); btn.classList.add('on');
  if(name==='memory')loadMem();
  if(name==='tasks')loadTasks();
  if(name==='messages')loadInbox();
}

async function loadMem(){
  try{
    renderMem((await req('GET','/memory/delta?since=2000-01-01T00:00:00.000Z')).reverse());
  }catch(e){$('mlist').textContent=e.message;}
}

async function search(){
  const q=$('q').value.trim();
  if(!q)return loadMem();
  try{ renderMem(await req('GET','/memory/search?q='+encodeURIComponent(q)+'&limit=20')); }
  catch(e){$('mlist').textContent=e.message;}
}

function renderMem(es){
  $('mlist').innerHTML=es.map(e=>`
    <div class="card">
      <div class="meta">[${e.id.slice(0,8)}] ${esc(e.agent_id)} · ${e.type} · ${e.scope}${e.project?' · '+esc(e.project):''} · ${e.updated_at.slice(0,16)} ${e.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(' ')}</div>
      <pre>${esc(e.content)}</pre>
    </div>`).join('');
}

async function writeMem(){
  const c=$('mc').value.trim(); if(!c)return;
  const tags=$('mtags').value.split(',').map(t=>t.trim()).filter(Boolean);
  await req('POST','/memory',{content:c,type:$('mtype').value,project:$('mproject').value||null,scope:'shared',tags,confidence:1.0});
  $('mc').value=''; loadMem();
}

async function loadTasks(){
  const s=$('tf').value;
  try{
    const ts=await req('GET','/tasks'+(s?'?status='+s:''));
    $('tlist').innerHTML=ts.map(t=>`
      <div class="card">
        <div class="meta">[${t.id.slice(0,8)}] <span class="s ${t.status}">${t.status}</span>${t.priority!=='normal'?' <b style="color:#fa4">'+t.priority+'</b>':''}${t.project?' · '+esc(t.project):''} · ${t.created_at.slice(0,16)}${t.assigned_to?' → '+esc(t.assigned_to):''}</div>
        <div><b>${esc(t.title)}</b>${t.description?' <span style="color:#888">'+esc(t.description)+'</span>':''}</div>
        <div class="row" style="margin-top:6px">
          ${t.status==='open'?`<button onclick="taskAction('${t.id}','claim')">claim</button>`:''}
          ${t.status==='claimed'?`<button onclick="taskAction('${t.id}','complete')">complete</button><button onclick="taskAction('${t.id}','fail')">fail</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){$('tlist').textContent=e.message;}
}

async function createTask(){
  const title=$('ttitle').value.trim(); if(!title)return;
  await req('POST','/tasks',{title,description:$('tdesc').value,project:$('tproject').value||null,priority:$('tpri').value});
  $('ttitle').value=''; $('tdesc').value=''; loadTasks();
}

async function taskAction(id,action){
  await req('POST',`/tasks/${id}/${action}`); loadTasks();
}

async function loadInbox(){
  try{
    const ms=await req('GET','/messages/inbox');
    $('msglist').innerHTML=ms.length?ms.map(m=>`
      <div class="card">
        <div class="meta">from <b style="color:#c8c8c8">${esc(m.from_agent)}</b>${m.subject?' · '+esc(m.subject):''} · ${m.created_at.slice(0,16)}</div>
        <pre>${esc(m.body)}</pre>
        <div class="row" style="margin-top:6px"><button onclick="markRead('${m.id}')">mark read</button></div>
      </div>`).join(''):'<div style="color:#444;padding:8px 0">no unread messages</div>';
  }catch(e){$('msglist').textContent=e.message;}
}

async function sendMsg(){
  const to=$('mto').value.trim(); if(!to)return;
  const body=$('mbody').value.trim(); if(!body)return;
  await req('POST','/messages',{to,subject:$('msub').value||'',body});
  $('mto').value=''; $('msub').value=''; $('mbody').value='';
  loadInbox();
}

async function markRead(id){
  await req('POST',`/messages/${id}/read`); loadInbox();
}

function startPoll(){
  if(_poll)clearInterval(_poll);
  let since=new Date(Date.now()-60000).toISOString();
  $('ev').innerHTML='<div style="color:#444">polling every 3s…</div>';
  async function poll(){
    try{
      const evs=await req('GET','/events?since='+since);
      if(evs.length){
        since=evs[evs.length-1].created_at;
        evs.forEach(e=>{
          const d=document.createElement('div');
          d.className='el';
          d.innerHTML=`${e.created_at.slice(11,19)} <span class="et">${esc(e.type)}</span> ${esc(e.agent_id)} ${esc(JSON.stringify(e.payload))}`;
          $('ev').prepend(d);
        });
      }
    }catch(_){}
  }
  poll(); _poll=setInterval(poll,3000);
}

loadMem();
</script>
</body>
</html>
